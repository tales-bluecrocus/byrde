name: Create Release

on:
    push:
        tags:
            - "v*"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: front-end/package-lock.json

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  tools: composer

            - name: Install Node dependencies
              run: npm ci
              working-directory: front-end

            - name: Build frontend
              run: npm run build
              working-directory: front-end

            - name: Install Composer dependencies (production only)
              run: composer install --no-dev --optimize-autoloader

            - name: Create distribution directory
              run: mkdir -p dist-release

            - name: Copy plugin files to distribution
              run: |
                  rsync -av --progress . dist-release/byrde \
                    --exclude='.git/' \
                    --exclude='.github/' \
                    --exclude='.vscode/' \
                    --exclude='.config/' \
                    --exclude='.agents/' \
                    --exclude='.claude/' \
                    --exclude='dist-release' \
                    --exclude='front-end/node_modules/' \
                    --exclude='front-end/src/' \
                    --exclude='front-end/public/' \
                    --exclude='front-end/.vite/' \
                    --exclude='front-end/.agents/' \
                    --exclude='front-end/.claude/' \
                    --exclude='front-end/vite.config.ts' \
                    --exclude='front-end/tsconfig*.json' \
                    --exclude='front-end/postcss.config.*' \
                    --exclude='front-end/tailwind.config.*' \
                    --exclude='front-end/components.json' \
                    --exclude='front-end/index.html' \
                    --exclude='front-end/package.json' \
                    --exclude='front-end/package-lock.json' \
                    --exclude='front-end/eslint.config.js' \
                    --exclude='front-end/jest.config.ts' \
                    --exclude='front-end/README.md' \
                    --exclude='front-end/claude.md' \
                    --exclude='front-end/content.md' \
                    --exclude='front-end/reference.md' \
                    --exclude='/style.css' \
                    --exclude='page-legal.php' \
                    --exclude='.gitignore' \
                    --exclude='.gitattributes' \
                    --exclude='composer.json' \
                    --exclude='composer.lock' \
                    --exclude='build.sh' \
                    --exclude='diagnose.php' \
                    --exclude='CLAUDE.md' \
                    --exclude='IMPLEMENTATION.md' \
                    --exclude='plugins/' \
                    --exclude='*.log'

            - name: Create ZIP file
              run: |
                  cd dist-release
                  zip -r ../byrde.zip byrde

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v1
              with:
                  files: byrde.zip
                  generate_release_notes: true
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
