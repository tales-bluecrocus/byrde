<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3ab342"/>
      <stop offset="100%" style="stop-color:#2e9035"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#bg-gradient)"/>
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Truck body -->
    <rect x="15" y="45" width="45" height="25" rx="3" fill="#ffffff" stroke="none"/>
    <!-- Truck cab -->
    <path d="M60 45 L60 70 L80 70 L80 55 L70 45 Z" fill="#ffffff" stroke="none"/>
    <!-- Wheels -->
    <circle cx="30" cy="70" r="8" fill="#000000" stroke="none"/>
    <circle cx="70" cy="70" r="8" fill="#000000" stroke="none"/>
    <!-- Wheel centers -->
    <circle cx="30" cy="70" r="3" fill="#ffffff" stroke="none"/>
    <circle cx="70" cy="70" r="3" fill="#ffffff" stroke="none"/>
    <!-- Window -->
    <rect x="63" y="50" width="12" height="10" rx="2" fill="#3ab342" stroke="none"/>
  </g>
</svg>
